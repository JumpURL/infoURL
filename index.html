<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>外部サイトへの移動確認</title>
  <meta name="twitter:card" content="summary">
  <meta property="og:title" content="詳細を確認する">
  <meta property="og:description" content="感想の作品をチェック">
  <style>
    body{ font-family:sans-serif; margin:0; padding:0; background:#f4f6f9; display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .card{ background:#fff; border-radius:8px; padding:40px; box-shadow:0 4px 24px rgba(0,0,0,.1); text-align:center; max-width:480px; width:90%; }
    .btn{ display:inline-block; padding:15px 50px; background:#cc0000; color:#fff; text-decoration:none; border-radius:4px; font-weight:bold; }
  </style>
</head>
<body>
  <div class="card">
    <h2>感想記載作品のサイトへ移動します</h2>
    <p>遷移先は公式ページです</p>
    <a id="jump-btn" class="btn" href="#">ページを開く</a>
  </div>
  <script>
    const AF_ID = "tkhr01-001";
    const params = new URLSearchParams(window.location.search);
    let finalUrl = "";

    if (params.has("target")) {
      try {
        let target = decodeURIComponent(params.get("target"));
        if (target.startsWith("http://") || target.startsWith("https://")) {
          finalUrl = target;
        } else {
          try { finalUrl = atob(target); } catch (e) {
            try { finalUrl = decodeURIComponent(atob(decodeURIComponent(target))); } catch (err) { finalUrl = ''; }
          }
        }
        if (finalUrl.includes("al.fanza.co.jp") || finalUrl.includes("al.dmm.co.jp")) {
          finalUrl = finalUrl.replace("ch=api", "ch=toolbar");
        }
      } catch(e) {
        console.error(e);
      }
    } 
    else if (params.has("type")) {
      const type = params.get("type");
      const cid = params.get("cid");
      const id = params.get("id");

      if (!cid) {
        document.body.innerHTML = "<h2>CID不足</h2>";
        throw new Error("cid missing");
      }
      if (!/^[a-zA-Z0-9_-]+$/.test(cid)) {
        document.body.innerHTML = "<h2>CIDエラー</h2>";
        throw new Error("cid invalid");
      }
      if (id && !/^\d+$/.test(id)) {
        document.body.innerHTML = "<h2>IDエラー</h2>";
        throw new Error("id invalid");
      }

      switch(type) {
        case "doujin": {
          const rawUrl = "https://www.dmm.co.jp/dc/doujin/-/detail/=/cid=" + cid + "/";
          finalUrl = "https://al.fanza.co.jp/?lurl=" + encodeURIComponent(rawUrl) + "&af_id=" + AF_ID + "&ch=toolbar&ch_id=link";
          break;
        }
        case "books": {
          if (!id) {
            document.body.innerHTML = "<h2>Books ID不足</h2>";
            throw new Error("id missing");
          }
          const rawUrl = "https://book.dmm.co.jp/product/" + id + "/" + cid + "/";
          finalUrl = "https://al.fanza.co.jp/?lurl=" + encodeURIComponent(rawUrl) + "&af_id=" + AF_ID + "&ch=toolbar&ch_id=link";
          break;
        }
        default:
          document.body.innerHTML = "<h2>未対応タイプ</h2>";
      }
    }

    if (finalUrl && finalUrl.startsWith("http")) {
      document.getElementById("jump-btn").href = finalUrl;
    }
  </script>
</body>
</html>
